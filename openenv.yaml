spec_version: 1
name: financial_market_env
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: "AI stock trading agent for the Indian equity market (NIFTY 50). The agent buys, sells, or holds stocks across multiple difficulty levels using technical indicators."
author: "Sushant Srivastava"
version: "1.0.0"

tasks:
  - id: easy
    difficulty: easy
    description: "Single stock (RELIANCE.NS), 10 steps, INR 10,000 starting cash. Score = return * 10, capped at 1.0."
    max_steps: 10
    reward_range: [0.0, 1.0]

  - id: medium
    difficulty: medium
    description: "3 stocks (RELIANCE, TCS, HDFCBANK), 30 steps, INR 30,000. Score = sigmoid(annualised Sharpe ratio)."
    max_steps: 30
    reward_range: [0.0, 1.0]

  - id: hard
    difficulty: hard
    description: "5 stocks, 40 steps, INR 50,000. Score = total_return - 0.5 * max_drawdown, normalised to [0,1]."
    max_steps: 40
    reward_range: [0.0, 1.0]

  - id: nifty50
    difficulty: hard
    description: "All 50 NIFTY stocks, 30 steps, INR 500,000. Same scoring as hard task."
    max_steps: 30
    reward_range: [0.0, 1.0]

grading:
  type: deterministic_programmatic
  score_range: [0.0, 1.0]
  llm_judging: false

reward:
  type: continuous
  range: [0.0, 1.0]

endpoints:
  - path: /reset
    method: POST
  - path: /step
    method: POST
  - path: /state
    method: GET
  - path: /tasks
    method: GET
    description: List all tasks with metadata
  - path: /grader
    method: POST
    description: Grade a submission for a given task
  - path: /health
    method: GET
  - path: /schema
    method: GET
